<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SignalMirage v1.5.0 RC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

<header class="app-header">
<h1>Signal<img src="logo-84.png" width="60" height="60" class="logo" alt="SignalMirage Logo">Mirage</h1>
<p>[transmission dither system for Photoshop]</p>
</header>

<main>

<section class="compact-section">
<h2>Source</h2>
<div class="previewToggleRow topPreviewToggleRow">
<label class="previewToggle">
<input type="checkbox" id="livePreview">
<span>LIVE Preview</span>
</label>
</div>
</section>

<section class="compact-section">
<h2>Preset</h2>
<div class="presetRow" id="presetRow">
<div class="presetButton" data-preset="clean" role="button" tabindex="0">Lucid</div>
<div class="presetButton" data-preset="ghost" role="button" tabindex="0">Ghost</div>
<div class="presetButton" data-preset="veil" role="button" tabindex="0">Veil</div>
<div class="presetButton" data-preset="echo" role="button" tabindex="0">Echo</div>
</div>
</section>

<section class="compact-section">
<h2>Customize</h2>
<label class="text-wide" for="engine">[Dither:Algorithm]</label>
<select id="engine">
<option value="atkinson">Atkinson</option>
<option value="floyd">Floyd-Steinberg</option>
</select>
</section>

<section class="compact-section">
<h2>Tone</h2>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="threshold">Exposure Bias</label><div class="value" id="thresholdValue">128</div></div>
<input type="range" id="threshold" min="1" max="255" value="128">
</div>
</div>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="signalResponse">Tonal Response</label><div class="value" id="signalResponseValue">48</div></div>
<input type="range" id="signalResponse" min="0" max="100" value="48">
</div>
</div>
</section>

<section class="compact-section range-section">
<h2>Range</h2>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="blackPoint"><span class="pointIcon pointBlack"></span>Black Point</label><div class="value" id="blackPointValue">0</div></div>
<input type="range" id="blackPoint" min="0" max="250" value="0">
</div>
</div>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="whitePoint"><span class="pointIcon pointWhite"></span>White Point</label><div class="value" id="whitePointValue">255</div></div>
<input type="range" id="whitePoint" min="5" max="255" value="255">
</div>
</div>
</section>

<section class="compact-section">
<h2>Structure</h2>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="dotSize">Dot Size</label><div class="value" id="dotSizeValue">1</div></div>
<input type="range" id="dotSize" min="1" max="2" value="1">
</div>
</div>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="diffusion">Diffusion</label><div class="value" id="diffusionValue">96</div></div>
<input type="range" id="diffusion" min="0" max="100" value="96">
</div>
</div>
</section>

<section class="compact-section">
<h2>Atmosphere</h2>
<div class="control compact-control">
<div class="controlBody">
<div class="controlTop"><label for="transmissionClarity">Transmission Clarity</label><div class="value" id="transmissionClarityValue">0</div></div>
<div class="clarity-labels"><span>Soft</span><span>Hard</span></div>
<input type="range" id="transmissionClarity" min="-100" max="100" value="0">
</div>
</div>
</section>

<section class="compact-section action-section">
<button id="resetEngine" class="miniButton" type="button">Reset Defaults</button>
<button id="applyEngine">Apply SignalMirage Process</button>
</section>

</main>
<footer>
<div id="status">READY</div>
<div class="version">Signal&middot;Mirage v1.5.0 RC</div>
</footer>
</div>
<script src="main.js"></script>
</body>
</html>
